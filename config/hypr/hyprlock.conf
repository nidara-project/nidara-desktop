# --- HYPRLOCK — Crystal Shell Lock Screen ---
# Edit this file at ~/.config/crystal-shell/hyprlock.conf
# Installed to ~/.config/hypr/hyprlock.conf via symlink (never overwritten by updates)

general {
    hide_cursor = true
    text_trim   = true
}

# ── Background ────────────────────────────────────────────────────────────────
# screenshot = capture the live desktop and apply blur → frosted glass effect
background {
    monitor =
    path    = screenshot
    color   = rgba(10, 10, 18, 1)   # fallback while blur loads

    blur_passes  = 4
    blur_size    = 8
    noise        = 0.0117
    contrast     = 0.95
    brightness   = 0.7
    vibrancy     = 0.25
    vibrancy_darkness = 0.1
}

# ── Glass panel (behind password area) ────────────────────────────────────────
background {
    monitor =
    path  =
    color = rgba(14, 14, 22, 0)

    # Centered panel behind the input card
    size     = 360, 180
    position = 0, -60
    halign   = center
    valign   = center
    zindex   = 0
}

# ── Clock ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:1000] date +"%H:%M"
    color       = rgba(255, 255, 255, 0.93)
    font_size   = 96
    font_family = Inter Thin

    position = 0, 140
    halign   = center
    valign   = center
}

# ── Date ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:60000] date +"%A, %d de %B"
    color       = rgba(255, 255, 255, 0.5)
    font_size   = 15
    font_family = Inter Regular

    position = 0, 52
    halign   = center
    valign   = center
}

# ── User ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text        = $DESC
    color       = rgba(255, 255, 255, 0.45)
    font_size   = 13
    font_family = Inter Regular

    position = 0, -44
    halign   = center
    valign   = center
}

# ── Password input ────────────────────────────────────────────────────────────
input-field {
    monitor =
    size              = 320, 50
    outline_thickness = 1
    dots_size         = 0.22
    dots_spacing      = 0.18
    dots_center       = true
    dots_rounding     = -1

    outer_color  = rgba(255, 255, 255, 0.12)
    inner_color  = rgba(255, 255, 255, 0.06)
    font_color   = rgba(255, 255, 255, 0.9)

    check_color  = rgba(0, 136, 255, 0.9)
    fail_color   = rgba(255, 69, 58, 0.9)
    fail_text    = <span font_family="Inter" font_size="small"><i>$FAIL ($ATTEMPTS)</i></span>

    fade_on_empty    = false
    placeholder_text = <span foreground="##ffffff55" font_family="Inter">Contraseña</span>
    hide_input       = false
    rounding         = 12

    position = 0, -108
    halign   = center
    valign   = center
}
