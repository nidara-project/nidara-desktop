# --- HYPRLOCK GLASS UI ---
# Diseño minimalista con desenfoque frosteado y tipografía JetBrains Mono
# Basado en la estética "Glass" de Waybar

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# --- FONDO CON BLUR ---
background {
    monitor =
    path = ~/.config/crystal-shell/config/wallpaper.png
    color = rgba(25, 20, 20, 1.0)

    # Efecto "Frosted Glass"
    blur_passes = 2 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- CAJA DE CONTRASEÑA ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.28      # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15   # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1    # -1 default circle, -2 follow input-field rounding
    
    # Colores Glass UI
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    
    # Colores de estado
    check_color = rgb(49, 116, 241)     # Azul Crystal Shell
    fail_color = rgb(204, 34, 34)       # Rojo Error
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    
    fade_on_empty = false
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    
    placeholder_text = <i><span foreground="##cdd6f4">Contraseña...</span></i>
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/capsule)

    position = 0, -50
    halign = center
    valign = center
}

# --- HORA (Gigante) ---
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    
    position = 0, 100
    halign = center
    valign = center
}

# --- FECHA (Pequeña) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d de %B")"
    color = rgba(200, 200, 200, 0.8)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    
    position = 0, 20
    halign = center
    valign = center
}

# --- MENSAJE DE BIENVENIDA ---
label {
    monitor =
    text = Hola, Angel
    color = rgba(200, 200, 200, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    
    position = 0, -100
    halign = center
    valign = center
}
