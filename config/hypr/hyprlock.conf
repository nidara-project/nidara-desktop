# --- HYPRLOCK — Crystal Shell Lock Screen ---
# Edit this file at ~/.config/crystal-shell/hyprlock.conf
# Installed to ~/.config/hypr/hyprlock.conf via symlink (never overwritten by updates)

general {
    hide_cursor = true
    text_trim   = true
}

# ── Background ────────────────────────────────────────────────────────────────
# screenshot = capture the live desktop and apply blur → frosted glass effect
background {
    monitor =
    path    = screenshot

    blur_passes  = 4
    blur_size    = 8
    noise        = 0.0117
    contrast     = 1.0
    brightness   = 0.75
    vibrancy     = 0.3
    vibrancy_darkness = 0.1
}

# ── Clock ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:1000] date +"%H:%M"
    color       = rgba(255, 255, 255, 0.92)
    font_size   = 112
    font_family = JetBrainsMono Nerd Font ExtraBold

    position = 0, 120
    halign   = center
    valign   = center
}

# ── Date ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text        = cmd[update:60000] date +"%A, %d de %B"
    color       = rgba(255, 255, 255, 0.65)
    font_size   = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign   = center
    valign   = center
}

# ── Password input ────────────────────────────────────────────────────────────
input-field {
    monitor =
    size             = 280, 52
    outline_thickness = 2
    dots_size        = 0.26
    dots_spacing     = 0.14
    dots_center      = true
    dots_rounding    = -1

    outer_color  = rgba(255, 255, 255, 0.15)
    inner_color  = rgba(255, 255, 255, 0.08)
    font_color   = rgba(255, 255, 255, 0.9)

    check_color  = rgba(120, 180, 255, 0.9)
    fail_color   = rgba(220, 60, 60, 0.9)
    fail_text    = <i>$FAIL ($ATTEMPTS)</i>

    fade_on_empty    = true
    fade_timeout     = 2000
    placeholder_text = <span foreground="##ffffff99">Contraseña</span>
    hide_input       = false
    rounding         = -1

    position = 0, -60
    halign   = center
    valign   = center
}

# ── User ──────────────────────────────────────────────────────────────────────
label {
    monitor =
    text        = $DESC
    color       = rgba(255, 255, 255, 0.5)
    font_size   = 13
    font_family = JetBrainsMono Nerd Font

    position = 0, -130
    halign   = center
    valign   = center
}
