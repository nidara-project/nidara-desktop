# MiDistroIA Hyprland Configuration
# Compositor de nueva generación con efectos visuales premium

# ══════════════════════════════════════════════════════════════
# MONITORES
# ══════════════════════════════════════════════════════════════
monitor=,preferred,auto,1

# ══════════════════════════════════════════════════════════════
# AUTOSTART
# ══════════════════════════════════════════════════════════════
exec-once = python3 ~/Dev/MiDistroIA/ui/dock/main_dock.py

# ══════════════════════════════════════════════════════════════
# INPUT
# ══════════════════════════════════════════════════════════════
input {
    kb_layout = es
    follow_mouse = 1
    sensitivity = 0
    
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ══════════════════════════════════════════════════════════════
# APARIENCIA - GLASSMORPHISM
# ══════════════════════════════════════════════════════════════
general {
    gaps_in = 8
    gaps_out = 15
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(1e1e2eaa)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 15
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
    }
    
    # Sombras suaves
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# ══════════════════════════════════════════════════════════════
# ANIMACIONES - FLUIDAS Y PREMIUM
# ══════════════════════════════════════════════════════════════
animations {
    enabled = true
    
    # Curvas de bezier personalizadas
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.4, 0.8, 0.2, 1.2
    
    animation = windows, 1, 4, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = border, 1, 10, default
    animation = fade, 1, 5, smoothIn
    animation = fadeDim, 1, 5, smoothIn
    animation = workspaces, 1, 6, overshot, slidevert
}

# ══════════════════════════════════════════════════════════════
# LAYOUTS
# ══════════════════════════════════════════════════════════════
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# ══════════════════════════════════════════════════════════════
# VARIABLES
# ══════════════════════════════════════════════════════════════
$mod = SUPER
$terminal = foot
$menu = wofi --show drun

# ══════════════════════════════════════════════════════════════
# KEYBINDINGS
# ══════════════════════════════════════════════════════════════

# Apps
bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $menu
bind = $mod, Q, killactive

# Ventanas
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Modo flotante / Fullscreen
bind = $mod SHIFT, space, togglefloating
bind = $mod, F, fullscreen

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Scroll workspaces con rueda del ratón
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mover/Resize con ratón
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Salir
bind = $mod SHIFT, E, exit

# Reload (Hyprland no necesita reload, pero por si acaso)
bind = $mod SHIFT, C, exec, hyprctl reload

# ══════════════════════════════════════════════════════════════
# REGLAS DE VENTANAS
# ══════════════════════════════════════════════════════════════
# El AI Menu como flotante y centrado
windowrulev2 = float, title:^(Menu IA)$
windowrulev2 = center, title:^(Menu IA)$

# El Dock debe ser flotante, sin bordes, y quedarse abajo
windowrulev2 = float, title:^(MiDistro Dock)$
windowrulev2 = pin, title:^(MiDistro Dock)$
windowrulev2 = noborder, title:^(MiDistro Dock)$
windowrulev2 = noshadow, title:^(MiDistro Dock)$
windowrulev2 = noblur, title:^(MiDistro Dock)$
windowrulev2 = size 700 60, title:^(MiDistro Dock)$
windowrulev2 = center, title:^(MiDistro Dock)$
windowrulev2 = move onscreen 0 100%-70, title:^(MiDistro Dock)$
