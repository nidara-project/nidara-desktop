# ----------------------------------------------------------------------
# DistroIA Dev Session (Nested) - STABLE WIKI-STRICT CONFIG
# ----------------------------------------------------------------------

monitor = , preferred, auto, 1

input {
    kb_layout = es
    follow_mouse = 1
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(ffffff4d) rgba(ffffff1a) 45deg
    col.inactive_border = rgba(59595933) # O usa rgba(59595933) ffffff00
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 24
    active_opacity = 1
    inactive_opacity = 1

    blur {
        enabled = true
        size = 2
        passes = 4
        popups = true
        popups_ignorealpha = 0.3
        ignore_opacity = true
        new_optimizations = false
        xray = false
        noise = 0.0117
        contrast = 1.3
        brightness = 1.0
        vibrancy = 0.616
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = 1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 0, 5, default
    animation = workspaces, 1, 6, default
}

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

exec-once = bash ~/Dev/Distroia/scripts/reload_ui.sh
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swww-daemon
exec-once = cursor-clip --daemon

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$menu = hyprlauncher

$mainMod = SUPER
bind = SUPER SHIFT, C, exec, bash ~/Dev/Distroia/scripts/reload_ui.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Space, exec, ags request "togglePrism()"
bind = $mainMod, K, exec, ags request "togglePrismLab()"
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, H, exec, kitty --title "Atajos de Teclado" --hold sh -c "cat ~/Dev/Distroia/config/cheatsheet.txt" 
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindr = SUPER, SUPER_L, exec, ags request "toggleAppGrid()"
# RESTAURACIÓN TOTAL (Wrapper externo para garantizar limpieza de entorno)
bind = , Print, exec, ~/Dev/Distroia/scripts/safe_screenshot.sh copy
bind = SHIFT, Print, exec, ~/Dev/Distroia/scripts/safe_screenshot.sh save "~/Pictures/Screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png"
bind = $mainMod, D, exec, ags request "toggleAppGrid()"
bind = $mainMod, S, exec, ags request "toggleSettings()"
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
# Activar/Desactivar pseudotile
bind = $mainMod, P, pseudo, # dwindle
# Cambiar la ventana enfocada entre modo Tile y Flotante
bind = $mainMod, F, togglefloating,
bind = $mainMod, V, exec, cursor-clip

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}




# --- "WIKI-STRICT" LAYER RULES ---
layerrule = blur on, match:namespace crystal-bar
layerrule = ignore_alpha 0.05, match:namespace crystal-bar

# layerrule = blur on, match:namespace crystal-dock
# layerrule = ignore_alpha 0.05, match:namespace crystal-dock

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.10, match:namespace waybar

layerrule = blur on, match:namespace launcher
layerrule = ignore_alpha 0.29, match:namespace launcher

# layerrule = blur on, match:namespace notification-center
# layerrule = ignore_alpha 0.05, match:namespace notification-center

layerrule = blur on, match:namespace control-center
layerrule = ignore_alpha 0.05, match:namespace control-center

layerrule = blur on, match:namespace notif-win
layerrule = ignore_alpha 0.05, match:namespace notif-win

layerrule = blur on, match:namespace app-grid-window
layerrule = ignore_alpha 0.3, match:namespace app-grid-window

layerrule = blur on, match:namespace prism
layerrule = ignore_alpha 0.05, match:namespace prism

layerrule = blur on, match:namespace prism-lab
layerrule = ignore_alpha 0.05, match:namespace prism-lab

layerrule = blur on, match:namespace prism-satellite
layerrule = ignore_alpha 0.05, match:namespace prism-satellite

# layerrule = blur on, match:namespace glass-test
layerrule = ignore_alpha 0.01, match:namespace glass-test

# --- WINDOWS RULES ---
windowrule = match:class ^(org.gnome.Nautilus)$, opacity 1 override 1 override

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vfr = true
}

ecosystem {
    no_update_news = true
}

# ── HYPRGLASS FLUID CRYSTAL ENGINE ──
plugin:hyprglass {
    enabled = 1
    default_theme = light
    default_preset = glass
    preset = name:glass, blur_strength:2.5, refraction_strength:0.8, chromatic_aberration:0.2, lens_distortion:0.1, fresnel_strength:0.8, edge_thickness:0.02, glass_opacity:1.0, vibrancy:0.2, brightness:1.05

    layers {
        enabled = 1
        namespaces = prism-lab, prism-satellite, control-center, glass-test
    }

        #dark:brightness = 0.82           # built-in dark theme override
        #light:adaptive_boost = 0.1       # built-in light theme override

        # Custom preset: shared + per-theme variants
        
        # blur_strength	        float	2.0	        —	    —	    Blur radius scale (value × 12.0 px)
        # blur_iterations	    int	    3	        —	    —	    Gaussian blur passes (1-5)
        # refraction_strength	float	0.6	        —	    —	    Edge refraction intensity (0.0-1.0)
        # chromatic_aberration	float	0.5	        —	    —	    Spectral dispersion at edges (0.0-1.0)
        # fresnel_strength	    float	0.6	        —	    —	    Edge glow intensity (0.0-1.0)
        # specular_strength	    float	0.8	        —	    —	    Specular highlight brightness (0.0-1.0)
        # glass_opacity	        float	1.0	        —	    —	    Overall glass opacity (0.0-1.0)
        # edge_thickness	    float	0.06	    —	    —	    Bezel width, fraction of smallest dimension (0.0-0.15)
        # tint_color	        color	0x8899aa22	—	    —	    Glass tint RRGGBBAA hex. Alpha = tint strength
        # lens_distortion	    float	0.5	        —	    —	    Center dome magnification (0.0-1.0)
        # brightness	        float	—	        0.82	1.12	Brightness multiplier
        # contrast	            float	—	        0.90	0.92	Contrast around midpoint
        # saturation	        float	—	        0.80	0.85	Desaturation (0 = grayscale, 1 = full)
        # vibrancy	            float	—	        0.15	0.12	Selective saturation boost
        # vibrancy_darkness	    float	—	        0.0	    0.0	    Vibrancy influence on dark areas (0-1)
        # adaptive_dim	        float	—	        0.4	    0.0	    Dims bright areas behind the glass (white is white 0 -to- 1 white becomes black)
    }

