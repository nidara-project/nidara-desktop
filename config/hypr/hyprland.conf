# ─────────────────────────────────────────────────────────────────────────────
# Crystal Shell — Hyprland configuration
# Installed to /usr/share/crystal-shell/config/hypr/hyprland.conf
# Do NOT edit this file directly. Use ~/.config/crystal-shell/hyprland-user.conf
# for personal overrides (keyboard layout, monitors, startup apps, etc.)
# ─────────────────────────────────────────────────────────────────────────────

monitor = , preferred, auto, 1

input {
    kb_layout = us
    follow_mouse = 1
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(ffffff4d) rgba(ffffff1a) 45deg
    col.inactive_border = rgba(59595933)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 24
    rounding_power = 3.2
    active_opacity = 1
    inactive_opacity = 1

    blur {
        enabled = true
        size = 1
        passes = 4
        popups = true
        popups_ignorealpha = 0.3
        ignore_opacity = true
        new_optimizations = true
        xray = false
        noise = 0.01
        contrast = 1.2
        brightness = 0.8
        vibrancy = 0.4
        vibrancy_darkness = 0.1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 2
        color = rgba(00000055)
    }
}

animations {
    enabled = 1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 0, 5, default
    animation = workspaces, 1, 6, default
}

# ── Crystal Shell startup ────────────────────────────────────────────────────
# uwsm app -- places each daemon in its own systemd scope so processes
# don't hang from Hyprland when the session ends.
exec-once = uwsm finalize                                                    # signal session ready to systemd
exec-once = uwsm app -- crystal-shell-ui
exec-once = uwsm app -- awww-daemon
exec-once = uwsm app -- /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = uwsm app -- hypridle

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus
$mainMod = SUPER

# ── Crystal Shell UI ─────────────────────────────────────────────────────────
bind = SUPER SHIFT, R, exec, uwsm app -- crystal-shell-ui   # Restart UI

# ── App launchers ─────────────────────────────────────────────────────────────
bind = $mainMod, S, exec, ags request toggleSettings
bindr = SUPER, SUPER_L, exec, ags request toggleAppGrid

bind = $mainMod, E, exec, uwsm app -- $fileManager
bind = $mainMod, T, exec, uwsm app -- $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,

# ── Focus & resize ────────────────────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ── Window modes ──────────────────────────────────────────────────────────────
bind = $mainMod, P, pseudo,       # dwindle pseudotile
bind = $mainMod, F, togglefloating,

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp -d)" ~/Pictures/Screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "Captura" "Guardada en Imágenes"

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    rounding = 8
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}


windowrule {
    name = steam-popups
    match:class = ^steam$
    match:title = ^$
    rounding = 0
    no_anim = true
}

windowrule {
    name = general-popups
    match:class = ^$
    no_anim = true
    rounding = 0
}

# ── Layer rules ───────────────────────────────────────────────────────────────
layerrule = blur on, match:namespace crystal-bar
layerrule = ignore_alpha 0.10, match:namespace crystal-bar

layerrule = blur on, match:namespace crystal-dock
layerrule = ignore_alpha 0.1, match:namespace crystal-dock

layerrule = blur on, match:namespace notif-win
layerrule = ignore_alpha 0.001, match:namespace notif-win

layerrule = blur on, match:namespace crystal-launcher
layerrule = ignore_alpha 0.001, match:namespace crystal-launcher
#layerrule = dim_around on, match:namespace crystal-launcher

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vfr = true
}

ecosystem {
    no_update_news = true
}

# ── Hyprglass Fluid Crystal Engine ────────────────────────────────────────────
plugin:hyprglass {
    enabled = true
    default_theme = dark
    default_preset = glass
    preset = name:glass, blur_strength:0.5, refraction_strength:0.7, chromatic_aberration:0.4, lens_distortion:0.1, fresnel_strength:0.1, edge_thickness:0.05, vibrancy:0.7, vibrancy_darkness:0.1, adaptive_boost:0.5, adaptive_dim:0.3, glass_opacity:1

    layers {
        enabled = false
        namespaces = crystal-dock, crystal-bar, notif-win, crystal-launcher
    }
}

# ── Crystal Shell generated settings ─────────────────────────────────────────
# Auto-generated by the Crystal Shell Settings UI. Do not edit manually.
source = ~/.config/crystal-shell/crystal-settings.conf

# ── User overrides ────────────────────────────────────────────────────────────
# Your personal config: keyboard layout, monitors, startup apps, keybinds, etc.
# This file is never overwritten by updates.
source = ~/.config/crystal-shell/hyprland-user.conf
