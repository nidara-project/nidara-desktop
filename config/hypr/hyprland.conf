# ----------------------------------------------------------------------
# DistroIA Dev Session (Nested) - STABLE WIKI-STRICT CONFIG
# ----------------------------------------------------------------------

monitor = , preferred, auto, 1

input {
    kb_layout = es
    follow_mouse = 1
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 18              # Radio "Squircle" oficial de Apple
    active_opacity = 0.85      # El cristal debe dejar pasar la luz
    inactive_opacity = 0.90    # Menos transparente para foco visual

    blur {
        enabled = true
        size = 10              # Radio más amplio para dispersión sedosa
        passes = 4             # Mínimo 4 pases para evitar "ruido" en el desenfoque
        ignore_opacity = true
        new_optimizations = true
        xray = false           # Xray rompe la estética de capas de Apple
        
        # --- EL SECRETO DE APPLE ---
        vibrancy = 0.25        # Realza los colores que atraviesan el cristal
        vibrancy_darkness = 0.1 # Mantiene los negros elegantes
        contrast = 1.1         # Da profundidad al contenido sobre el cristal
        brightness = 1.2       # El cristal de Apple suele "emitir" algo de luz
        noise = 0.02           # Un toque casi invisible de grano evita bandas de color
    }

    shadow {
        enabled = true         # Apple usa sombras profundas pero suaves
        range = 30
        render_power = 3
        color = rgba(00000044) # Sombra aireada, no sólida
    }
}

animations {
    enabled = 1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 0, 5, default
    animation = workspaces, 1, 6, default
}

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

exec-once = bash /home/angel/Dev/MiDistroIA/scripts/start_wayland_stack.sh
exec-once = swaybg -i /home/angel/Pictures/wallpaper.jpg -m fill

$mainMod = SUPER
bind = SUPER SHIFT, C, exec, bash /home/angel/Dev/MiDistroIA/scripts/reload_ui.sh
bind = $mainMod, T, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, H, exec, kitty --title "Atajos de Teclado" --hold sh -c "cat /home/angel/Dev/MiDistroIA/cheatsheet.txt" 
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" "/home/angel/Pictures/Screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png"
bindr = SUPER, SUPER_L, exec, ags request "toggleAppGrid()"
bind = $mainMod, D, exec, wofi --show drun 
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- "WIKI-STRICT" LAYER RULES ---
layerrule = blur on, match:namespace crystal-bar
layerrule = ignore_alpha 0.25, match:namespace crystal-bar

layerrule = blur on, match:namespace crystal-dock
layerrule = ignore_alpha 0.25, match:namespace crystal-dock

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.25, match:namespace waybar

layerrule = blur on, match:namespace launcher
layerrule = ignore_alpha 0.25, match:namespace launcher

layerrule = blur on, match:namespace app-grid
layerrule = ignore_alpha 0.25, match:namespace app-grid

layerrule = blur on, match:namespace notification-center
layerrule = ignore_alpha 0.25, match:namespace notification-center

layerrule = blur on, match:namespace control-center
layerrule = ignore_alpha 0.25, match:namespace control-center

layerrule = blur on, match:namespace notif-win
layerrule = ignore_alpha 0.25, match:namespace notif-win

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vfr = true
}

ecosystem {
    no_update_news = true
}
