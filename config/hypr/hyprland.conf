
# ----------------------------------------------------------------------
# DistroIA Dev Session (Nested)
# ----------------------------------------------------------------------

monitor=,preferred,auto,1

# --- INPUT ---
input {
    kb_layout = es
    follow_mouse = 1
    float_switch_override_focus = 0
    touchpad {
        natural_scroll = no
    }
}

# --- GENERAL ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true # Habilitar redimensionado arrastrando bordes
}

# --- DECORATION ---
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    blur {
        enabled = true
        size = 6
        passes = 3 # CLASSIC SHARPNESS - STABLE
        ignore_opacity = true
        new_optimizations = true
        xray = true
        vibrancy = 1.2 # NATURAL SATURATION
        contrast = 1.2 # CRYSTAL DEFINITION
        brightness = 1.1 
        noise = 0.01 
    }
    
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(00000055)
    }
}

# --- ANIMATIONS ---
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- MISC ---
# MISC moved to bottom

# --- ENVIRONMENT VARIABLES ---
# Optimization: Enable hardware acceleration and modern Wayland support
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1


# --- DISTROIA COMPONENTS ---
# Launch our Python stack
exec-once = bash /home/angel/Dev/MiDistroIA/scripts/start_wayland_stack.sh
# Set wallpaper (Hyprpaper)
exec-once = swaybg -i /home/angel/Pictures/wallpaper.jpg -m fill

# --- KEYBINDINGS ---
$mainMod = SUPER

# Reload UI Stack (Hyprland, Waybar, Dock, Wallpaper)
bind = $mainMod SHIFT, C, exec, bash /home/angel/Dev/MiDistroIA/scripts/reload_ui.sh

# Set Kitty as default terminal
bind = $mainMod, T, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, H, exec, kitty --title "Atajos de Teclado" --hold sh -c "cat /home/angel/Dev/MiDistroIA/cheatsheet.txt" 


# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- SCREENSHOTS (Autogenerated) ---
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)" "/home/angel/Pictures/Screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png"

# --- APP LAUNCHER ---
bindr = SUPER, SUPER_L, exec, ags request "toggleAppGrid()"
bind = $mainMod, D, exec, wofi --show drun 

# --- MOUSE BINDINGS (Resize/Move) ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, mouse:274, resizewindow # Middle click also resizes

# Atajos de teclado para redimensionar (flechas)
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

# --- WINDOW MANAGEMENT ---
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Helper: Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# Hyprland Layer Rules (Named Blocks - v0.53.3 Skill)
layerrule {
  name = crystal-dock-glass
  match:namespace = crystal-dock
  ignore_alpha = 0.05
  blur = on
  xray = 1
}

layerrule {
  name = waybar-glass
  match:namespace = waybar
  ignore_alpha = 0.05
  blur = on
  xray = 1
}

layerrule {
  name = launcher-glass
  match:namespace = launcher
  ignore_alpha = 0.05
  blur = on
  xray = 1
}

layerrule {
  name = swaync-glass
  match:namespace = swaync-control-center
  ignore_alpha = 0.1
  blur = on
  xray = 1
}

layerrule {
  name = swaync-notif-glass
  match:namespace = swaync-notification-window
  ignore_alpha = 0.5
  blur = on
  xray = 1
}

layerrule {
  name = app-grid-blur
  match:namespace = app-grid
  ignore_alpha = 0.1
  blur = on
}

# --- MISC & EXTRA ---
misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

ecosystem {
    no_update_news = true
}
