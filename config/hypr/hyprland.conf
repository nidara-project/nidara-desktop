# ----------------------------------------------------------------------
# DistroIA Dev Session (Nested) - STABLE WIKI-STRICT CONFIG
# ----------------------------------------------------------------------

monitor = , preferred, auto, 1

input {
    kb_layout = es
    follow_mouse = 1
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    active_opacity = 0.95
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 6
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        xray = true
    }

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(00000044)
    }
}

animations {
    enabled = 1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 0, 5, default
    animation = workspaces, 1, 6, default
}

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11
env = MOZ_ENABLE_WAYLAND,1

exec-once = bash /home/angel/Dev/DistroIA/scripts/reload_ui.sh
# exec-once = swww-daemon

$mainMod = SUPER
bind = SUPER SHIFT, C, exec, bash /home/angel/Dev/DistroIA/scripts/reload_ui.sh
bind = $mainMod, T, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, H, exec, kitty --title "Atajos de Teclado" --hold sh -c "cat /home/angel/Dev/DistroIA/config/cheatsheet.txt" 
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindr = SUPER, SUPER_L, exec, ags request "toggleAppGrid()"
# RESTAURACIÓN TOTAL (Wrapper externo para garantizar limpieza de entorno)
bind = , Print, exec, /home/angel/Dev/DistroIA/scripts/safe_screenshot.sh copy
bind = SHIFT, Print, exec, /home/angel/Dev/DistroIA/scripts/safe_screenshot.sh save "/home/angel/Pictures/Screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png"
bind = $mainMod, D, exec, ags request "toggleAppGrid()"
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# --- "WIKI-STRICT" LAYER RULES ---
layerrule = blur on, match:namespace crystal-bar
layerrule = ignore_alpha 0.25, match:namespace crystal-bar

layerrule = blur on, match:namespace crystal-dock
layerrule = ignore_alpha 0.2, match:namespace crystal-dock

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.25, match:namespace waybar

layerrule = blur on, match:namespace launcher
layerrule = ignore_alpha 0.25, match:namespace launcher

layerrule = blur on, match:namespace notification-center
layerrule = ignore_alpha 0.25, match:namespace notification-center

layerrule = blur on, match:namespace control-center
layerrule = ignore_alpha 0.25, match:namespace control-center

layerrule = blur on, match:namespace notif-win
layerrule = ignore_alpha 0.25, match:namespace notif-win

layerrule = blur on, match:namespace app-grid-window
layerrule = ignore_alpha 0.25, match:namespace app-grid-window

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
    vfr = true
}

ecosystem {
    no_update_news = true
}
