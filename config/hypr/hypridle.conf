# --- HYPRIDLE - Crystal Shell Idle Management ---
# Documentación: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
# OJO: hyprctl dispatch usa el parser Lua — la sintaxis clásica
# `hyprctl dispatch dpms off` es un error de Lua y deja la pantalla
# irrecuperable al despertar. Usar siempre hl.dsp.*.

general {
    lock_cmd = crystal-lock                      # Evita múltiples instancias (el script ya lo gestiona)
    before_sleep_cmd = crystal-before-sleep      # Guarda volumen + bloquea (vía loginctl, no bloqueante)
    after_sleep_cmd  = crystal-after-sleep       # Reenciende pantalla + restaura volumen
    ignore_dbus_inhibit = false                  # Respeta inhibidores (ej: vídeos)
}

# 1. Apagar pantalla tras 5 min de inactividad
listener {
    timeout = 300                                # 5 minutos
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume  = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# 2. Bloquear sesión tras 10 min de inactividad
listener {
    timeout = 600                                # 10 minutos
    on-timeout = crystal-lock
}

# 3. Suspender sistema tras 30 min de inactividad (solo si hay batería o lo deseas)
# listener {
#     timeout = 1800                             # 30 minutos
#     on-timeout = systemctl suspend
# }
