# --- HYPRIDLE - Nidara Idle Management ---
# Documentación: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
# OJO: hyprctl dispatch usa el parser Lua — la sintaxis clásica
# `hyprctl dispatch dpms off` es un error de Lua y deja la pantalla
# irrecuperable al despertar. Usar siempre hl.dsp.*.

general {
    lock_cmd = nidara-lock                      # Evita múltiples instancias (el script ya lo gestiona)
    before_sleep_cmd = nidara-before-sleep      # Guarda volumen + bloquea (vía loginctl, no bloqueante)
    after_sleep_cmd  = nidara-after-sleep       # Reenciende pantalla + restaura volumen
    ignore_dbus_inhibit = false                  # Respeta inhibidores (ej: vídeos)
}

# 1. Apagar pantalla tras 5 min de inactividad
listener {
    timeout = 300                                # 5 minutos
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume  = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# 2. Bloquear sesión tras 10 min de inactividad
listener {
    timeout = 600                                # 10 minutos
    on-timeout = nidara-lock
}

# 3. Suspensión por inactividad: nidara-setup la SIEMBRA (30 min) en la copia
#    per-user solo cuando detecta batería (/sys/class/power_supply/BAT*) — en
#    sobremesas el default es nunca (mata descargas/sesiones remotas). Se ajusta
#    en Settings → Energía; este bloque queda como referencia de la forma:
# listener {
#     timeout = 1800                             # 30 minutos
#     on-timeout = systemctl suspend
# }
