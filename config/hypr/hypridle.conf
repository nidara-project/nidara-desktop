# --- HYPRIDLE - Crystal Shell Idle Management ---
# Documentación: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

general {
    lock_cmd = crystal-lock                      # Evita multiples instancias (el script ya lo gestiona)
    before_sleep_cmd = crystal-lock               # Bloquea antes de suspender
    after_sleep_cmd  = hyprctl dispatch dpms on  # Enciende pantalla al volver
    ignore_dbus_inhibit = false                  # Respeta inhibidores (ej: vídeos)
}

# 1. Apagar pantalla tras 5 min de inactividad
listener {
    timeout = 300                                # 5 minutos
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 2. Bloquear sesión tras 10 min de inactividad
listener {
    timeout = 600                                # 10 minutos
    on-timeout = crystal-lock
}

# 3. Suspender sistema tras 30 min de inactividad (solo si hay batería o lo deseas)
# listener {
#     timeout = 1800                             # 30 minutos
#     on-timeout = systemctl suspend
# }
