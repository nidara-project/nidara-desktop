# Hyprland configuration for the Crystal Shell greeter (greetd session)
# Installed to /etc/greetd/hyprland-greeter.conf
# This is a minimal, locked-down config — not user-editable.

monitor = , preferred, auto, 1

env = HOME,/var/lib/greeter
env = XDG_CONFIG_HOME,/var/lib/greeter/.config

# Wallpaper via awww
exec-once = awww-daemon
exec-once = sleep 1 && awww img /usr/share/crystal-shell/wallpaper.png --transition-type fade --transition-duration 1

# Launch Crystal Shell greeter — exits Hyprland when done
exec-once = crystal-greeter; hyprctl dispatch exit

input {
    kb_layout = us
    follow_mouse = 1
}

general {
    border_size = 0
    col.active_border   = rgba(ffffff00)
    col.inactive_border = rgba(ffffff00)
    layout = dwindle
}

decoration {
    rounding = 0

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.01
        contrast = 1.1
        brightness = 0.8
        vibrancy = 0.3
        vibrancy_darkness = 0.1
        xray = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo   = true
    force_default_wallpaper = 0
    disable_autoreload      = true
    background_color        = rgba(0a0a12ff)
    vfr = true
}

# Blur the greeter layer surface
layerrule = blur on, match:namespace crystal-greeter
layerrule = ignorealpha 0.01, match:namespace crystal-greeter
