# Hyprland configuration for the Crystal Shell greeter (greetd session)
# Installed to /etc/greetd/hyprland-greeter.conf
# This is a minimal, locked-down config — not user-editable.

monitor = , preferred, auto, 1

# Wallpaper — start daemon then set image immediately
exec-once = awww-daemon
exec-once = sleep 0.3 && awww img /usr/share/crystal-shell/wallpaper.png --transition-type none

# Launch regreet, then exit Hyprland when it closes
exec-once = sleep 0.5 && regreet; hyprctl dispatch exit

input {
    kb_layout = us
    follow_mouse = 1
}

general {
    border_size = 0
    col.active_border   = rgba(ffffff00)
    col.inactive_border = rgba(ffffff00)
    layout = dwindle
}

decoration {
    rounding = 0

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.01
        contrast = 1.1
        brightness = 0.8
        vibrancy = 0.3
        vibrancy_darkness = 0.1
        xray = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo   = true
    force_default_wallpaper = 0
    disable_autoreload      = true
    vfr = true
}

# Make regreet fullscreen so it covers the whole screen
windowrule {
    name = fullscreen-greeter
    match:class = regreet
    fullscreen = yes
}
