<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Per-language CJK variant selection (Nidara).

  Chinese, Japanese and Korean share codepoints for the Han characters, but each
  region writes many of them with different stroke forms. Arch's noto-fonts-cjk
  ships the regional Noto CJK faces with NO fontconfig rules, and fontconfig
  cannot tell the faces apart by language (every face in the .ttc covers the
  full unified-Han charset, so all of them "speak" ja/zh/ko): on a stock install
  EVERY CJK language resolves to the same arbitrary face — Noto Sans CJK KR
  (verified 2026-07-13) — so Chinese and Japanese users read their hanzi/kanji
  with Korean stroke forms.

  These rules prepend the correct regional face based on the language of the
  text being rendered, the same way Fedora configures its Noto CJK packages.
  Pango derives that language from the locale (LANG, i.e. Settings → Region),
  so each user gets their region's forms with no extra setup. Per-user
  fontconfig (~/.config/fontconfig, loaded at priority 50) still outranks this
  file.

  THE FILENAME IS LOAD-BEARING. The KR bias comes from fontconfig's own
  65-nonlatin.conf, whose fallback list hardcodes "Noto Sans CJK KR" (and no
  other regional variant). Generic-family edits insert immediately before
  "sans-serif", so whichever config file runs FIRST lands earlier in the family
  list — and earlier position wins among fallback families. This file must
  therefore sort BEFORE 65-nonlatin.conf in /etc/fonts/conf.d: hence the
  "65-0-" prefix (Fedora's convention for the same fix). Named 70- the rules
  load fine but still lose to KR — verified both ways 2026-07-13.

  Latin text is untouched: the UI font (Inter) stays first in every pattern —
  these families only serve the glyphs the primary font doesn't have.

  Shared file: shipped by the nidara pacman package (PKGBUILD) AND by dev
  installs (install.sh §6) as /usr/share/fontconfig/conf.avail/… + a symlink in
  /etc/fonts/conf.d/ — keep ONE source here.
-->
<fontconfig>

  <!-- Japanese -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ja</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Mono CJK JP</string></edit>
  </match>

  <!-- Korean -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK KR</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif CJK KR</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>ko</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Mono CJK KR</string></edit>
  </match>

  <!-- Simplified Chinese (mainland China, Singapore) -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-cn</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK SC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-cn</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif CJK SC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-cn</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Mono CJK SC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-sg</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK SC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-sg</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif CJK SC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-sg</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Mono CJK SC</string></edit>
  </match>

  <!-- Traditional Chinese (Taiwan) -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-tw</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK TC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-tw</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif CJK TC</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-tw</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Mono CJK TC</string></edit>
  </match>

  <!-- Traditional Chinese (Hong Kong, Macau) -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-hk</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-hk</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-hk</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Mono CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-mo</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-mo</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="prepend"><string>Noto Serif CJK HK</string></edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-mo</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Noto Sans Mono CJK HK</string></edit>
  </match>

</fontconfig>
