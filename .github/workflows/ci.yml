# CI — automated checks that run on every push and pull request.
#
# What this is: a robot on GitHub that, every time code is pushed, verifies the
# project still assembles correctly. A green check = safe; a red check = something
# to look at, caught BEFORE it reaches the running shell.
#
# Two gates:
#   - styles:    the SCSS stylesheet compiles (catches CSS syntax errors).
#   - typecheck: TypeScript checks that all the pieces fit (catches typos, wrong
#                arguments, missing translation keys, etc.) without running the app.
#
# Neither needs GTK or the `ags` binary: the GI/ags types are provided by the
# committed `@girs/` typings + the stubs in `types.d.ts` / `gi-types.d.ts`, so a
# stock CI runner can type-check without installing the system shell.
#
# Not here: `ags bundle` — needs the `ags` binary + GTK4 system libraries, which
# aren't available on a stock runner. Built locally instead.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  styles:
    name: Build styles (SCSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Compile SCSS (must succeed)
        working-directory: ui/ags-v3
        run: npx --yes sass@1.97.3 --no-charset style.scss /tmp/style.css

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Type-check (no emit)
        working-directory: ui/ags-v3
        # Resolves ags/* via the stubs in types.d.ts and GI via committed @girs/,
        # so no node_modules / system ags needed.
        run: npx --yes -p typescript@5.7.3 tsc --noEmit -p tsconfig.json
