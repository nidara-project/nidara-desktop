# CI — automated checks that run on every push and pull request.
#
# What this is: a robot on GitHub that, every time code is pushed, verifies the
# project still assembles correctly. A green check = safe; a red check = something
# to look at, caught BEFORE it reaches the running shell.
#
# Gates here:
#   - styles: the SCSS stylesheet compiles (catches CSS syntax errors). Pure JS,
#     no system libraries needed.
#   - typecheck: `tsc --noEmit` over ui/ags-v3. The GI typings it needs (@girs/,
#     ~58 MB generated, git-ignored) can't be produced on a runner — `ags types`
#     needs the ags binary + Astal libs. Instead a maintainer publishes a ~4 MB
#     compressed snapshot as an asset on the `ci-assets` release
#     (scripts/dev/publish-ci-typings.sh) and this job downloads it. The repo's
#     own types.d.ts declares the "ags/*" modules ambiently, so tsc needs no
#     node_modules at all. If this job fails on a type that exists locally, the
#     snapshot is stale → re-run the publish script.
#
# Not here: `ags bundle` — needs the `ags` binary + GTK4 libraries.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  styles:
    name: Build styles (SCSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Compile SCSS (must succeed)
        working-directory: ui/ags-v3
        run: npx --yes sass@1.97.3 --no-charset style.scss /tmp/style.css

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Download @girs snapshot (ci-assets release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release download ci-assets --repo "$GITHUB_REPOSITORY" \
               --pattern girs-snapshot.tar.zst --output /tmp/girs-snapshot.tar.zst; then
            echo "::error::No @girs snapshot found on the 'ci-assets' release."
            echo "A maintainer must publish it once: scripts/dev/publish-ci-typings.sh"
            exit 1
          fi
          tar --zstd -xf /tmp/girs-snapshot.tar.zst -C ui/ags-v3
          echo "Extracted @girs: $(du -sh ui/ags-v3/@girs | cut -f1)"
      - name: tsc --noEmit (must succeed)
        working-directory: ui/ags-v3
        run: npx --yes -p typescript@5.7.3 tsc --noEmit -p tsconfig.json
