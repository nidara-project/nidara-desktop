# CI — automated checks that run on every push and pull request.
#
# What this is: a robot on GitHub that, every time code is pushed, verifies the
# project still assembles correctly. A green check = safe; a red check = something
# to look at, caught BEFORE it reaches the running shell.
#
# Gate here:
#   - styles: the SCSS stylesheet compiles (catches CSS syntax errors). Pure JS,
#     no system libraries needed.
#
# Typecheck is intentionally NOT a CI gate:
#   `tsc --noEmit` needs the GI type definitions (the local `@girs/` dir, ~58 MB
#   of AUTO-GENERATED typings that are .gitignored). Committing 58 MB of generated
#   files just to type-check in CI isn't worth the repo bloat. Instead the
#   typecheck runs locally — `npm run typecheck` (and your editor) — where @girs
#   is present. It's green and catches real bugs; it just isn't automated on push.
#   (To make it a CI gate later, we'd commit @girs or install the GIR libs in CI.)
#
# Also not here: `ags bundle` — needs the `ags` binary + GTK4 libraries.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  styles:
    name: Build styles (SCSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Compile SCSS (must succeed)
        working-directory: ui/ags-v3
        run: npx --yes sass@1.97.3 --no-charset style.scss /tmp/style.css
