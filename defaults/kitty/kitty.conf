# ── Nidara default kitty.conf ────────────────────────────────────────────────
# Seeded once by nidara-setup; after that this file is yours — Nidara updates
# never touch it. Full option reference: https://sw.kovidgoyal.net/kitty/conf/
# ─────────────────────────────────────────────────────────────────────────────

# Keep text clear of Hyprland's rounded corners (Nidara default: rounding 24).
# Without padding the first/last rows get clipped by the corner radius.
window_padding_width 16

# The monospace font Nidara ships. kitty doesn't read the system (gsettings)
# monospace preference, so it has to be named here as well.
font_family      JetBrainsMono Nerd Font
font_size        11.0

# Glass: Hyprland blurs translucent windows, so a see-through terminal picks
# up the frosted Nidara look. Raise toward 1.0 for a more opaque terminal —
# or adjust live with Ctrl+Shift+A then M (more) / L (less) / D (default).
background_opacity 0.5
dynamic_background_opacity yes

# Terminal colors live in {dark,light,no-preference}-theme.auto.conf next to
# this file: kitty picks one from the system color scheme and follows the
# Appearance dark/light toggle live. Delete those files to opt out.

cursor_shape     beam
cursor_blink_interval 0.5

# No audible ding.
enable_audio_bell no

# Close windows without a confirmation prompt, even with processes running.
# Set to -1 to be asked when something is still running.
confirm_os_window_close 0
